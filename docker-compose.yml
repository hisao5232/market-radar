services:
  db:
    image: postgres:16-alpine
    container_name: market-radar-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - market_radar_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: market-radar-backend
    build: ./backend
    restart: always
    env_file: .env
    command: uvicorn api:app --host 0.0.0.0 --port 8021
    depends_on:
      - db
    networks:
      - market_radar_net
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.market-radar-api.rule=Host(`${DOMAIN_RADAR_API}`)"
      - "traefik.http.routers.market-radar-api.entrypoints=websecure"
      - "traefik.http.routers.market-radar-api.tls=true"
      - "traefik.http.routers.market-radar-api.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.services.market-radar-api.loadbalancer.server.port=8021"
      - "traefik.docker.network=traefik-public"

  frontend:
    container_name: market-radar-frontend
    build: 
      context: ./frontend
      # ビルド時に環境変数を注入（Next.jsの静的生成に必要）
      args:
        - NEXT_PUBLIC_API_URL=https://${DOMAIN_RADAR_API}
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=https://${DOMAIN_RADAR_API}
      - API_KEY=${API_KEY}
    networks:
      - market_radar_net
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.market-radar-front.rule=Host(`${DOMAIN_RADAR_FRONT}`)"
      - "traefik.http.routers.market-radar-front.entrypoints=websecure"
      - "traefik.http.routers.market-radar-front.tls=true"
      - "traefik.http.routers.market-radar-front.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.services.market-radar-front.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-public"

networks:
  market_radar_net:
  traefik-public:
    external: true

volumes:
  postgres_data:
